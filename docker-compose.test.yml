version: '3.8'

services:
  # PostgreSQL Database for testing
  postgres-test:
    image: postgres:17-alpine
    container_name: telerpg_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telerpg_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for testing
  redis-test:
    image: redis:alpine
    container_name: telerpg_redis_test
    ports:
      - "6380:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Test service
  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telerpg_test
    environment:
      - NODE_ENV=test
      - BOT_TOKEN=test-token
      - DB_HOST=postgres-test
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=telerpg_test
      - REDIS_HOST=redis-test
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - QUEUE_NAME=telerpg_test_queue
    volumes:
      - .:/app
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: >
      sh -c "npm run migrate && npm run test:docker"